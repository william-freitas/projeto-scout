# Configuração de Conexão com o MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/CampeonatoFutebol?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/CampeonatoFutebol?createDatabaseIfNotExist=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=wilL6424
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Inicialização do Banco (para rodar o seu script)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Define o caractere de quebra para evitar erros com blocos BEGIN/END no schema.sql
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Porta do Servidor
server.port=8080
